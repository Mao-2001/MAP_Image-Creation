name: Build Windows Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version tag'
        required: true
        default: '1.3.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg (with caching)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          modules: qtwebengine qtwebchannel qtpositioning

      - name: Install ImageMagick (for GIF export)
        run: choco install imagemagick --no-progress -y

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          $pkg = "package"
          New-Item -ItemType Directory -Force -Path $pkg

          # Binary + assets
          Copy-Item "build\Release\MAP_v1.3.exe" $pkg
          Copy-Item "map.html" $pkg

          # Qt DLLs + platform plugins (windeployqt)
          windeployqt "$pkg\MAP_v1.3.exe"

          # Find vcpkg installed directory (could be in multiple locations)
          $vcpkgRoots = @(
              "build\vcpkg_installed",
              "vcpkg_installed",
              "$env:VCPKG_ROOT\installed"
          ) | Where-Object { Test-Path "$_\x64-windows" } | Select-Object -First 1
          if (-not $vcpkgRoots) { throw "Cannot find vcpkg installed directory" }
          $vcpkgDir = "$vcpkgRoots\x64-windows"

          # GDAL DLLs
          if (Test-Path "$vcpkgDir\bin") {
              Get-ChildItem "$vcpkgDir\bin" -Filter "*.dll" | Copy-Item -Destination $pkg
          }

          # GDAL tools (gdalwarp.exe) - 递归搜索兼容多种 vcpkg 目录结构
          $gdalwarpPaths = @(
              "$vcpkgDir\tools\gdal\gdalwarp.exe",
              "$vcpkgDir\bin\gdalwarp.exe",
              (Get-ChildItem "$vcpkgDir" -Recurse -Filter "gdalwarp.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if ($gdalwarpPaths) {
              Copy-Item $gdalwarpPaths $pkg
              Write-Host "gdalwarp.exe bundled from $gdalwarpPaths"
          } else {
              Write-Warning "gdalwarp.exe not found, downsampling will fail"
          }

          # GDAL data files
          if (Test-Path "$vcpkgDir\share\gdal") {
              Copy-Item -Recurse "$vcpkgDir\share\gdal" "$pkg\gdal_data"
          }
          if (Test-Path "$vcpkgDir\share\proj") {
              Copy-Item -Recurse "$vcpkgDir\share\proj" "$pkg\proj_data"
          }
          if (-not (Test-Path "$pkg\gdal_data")) {
              Write-Warning "gdal_data not found, coordinate transforms may fail"
          }

          # ImageMagick (for GIF export)
          $imDir = Get-ChildItem "C:/Program Files/ImageMagick-*" | Select-Object -First 1
          if ($imDir) {
              Copy-Item "$($imDir.FullName)/magick.exe" $pkg
              # 复制核心 DLL（CORE_RL_*），它们在安装根目录，不在 bin/ 下
              Get-ChildItem "$($imDir.FullName)" -Filter "CORE_RL_*.dll" | Copy-Item -Destination $pkg
              if (Test-Path "$($imDir.FullName)/bin") {
                  Get-ChildItem "$($imDir.FullName)/bin" -Filter "*.dll" | Copy-Item -Destination $pkg
              }
              if (Test-Path "$($imDir.FullName)/modules") {
                  Copy-Item "$($imDir.FullName)/modules" "$pkg/modules" -Recurse
              }
              Write-Host "ImageMagick bundled from $($imDir.FullName)"
          } else {
              Write-Warning "ImageMagick not found, GIF export will fail"
          }

          # Create launcher that sets GDAL/PROJ data paths
          @"
          @echo off
          set "GDAL_DATA=%~dp0gdal_data"
          set "PROJ_LIB=%~dp0proj_data"
          start "" "%~dp0MAP_v1.3.exe"
          "@ | Out-File -FilePath "$pkg\MAP_v1.3.bat" -Encoding ASCII

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MAP_v1.3_Windows_${{ github.event.inputs.version }}
          path: package/
